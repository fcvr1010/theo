[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "theo"
version = "0.1.0-dev"
description = "Codebase intelligence agent -- builds a living knowledge graph of any software repository"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "real-ladybug>=0.15",
    "fastembed>=0.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "mypy>=1.10",
    "ruff>=0.9",
    "pre-commit>=4.0",
]

[project.scripts]
theo = "theo.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/theo"]

[tool.ruff]
target-version = "py311"
line-length = 99
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
mypy_path = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: marks tests requiring real DB and ML model (deselect with '-m not integration')",
]
